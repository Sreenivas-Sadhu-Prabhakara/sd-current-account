spring:
  application:
    name: sd-current-account
  # Datasource is defined but LAZY — no connection is made unless the
  # 'postgres' profile activates JdbcAccountRepository. Default stays in-memory.
  datasource:
    url: ${BIAN_DB_URL:jdbc:postgresql://localhost:5432/currentaccount}
    username: ${BIAN_DB_USER:currentaccount}
    password: ${BIAN_DB_PASSWORD:currentaccount-localdev}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Current Account"
    businessArea: "Operations and Execution"
    businessDomain: "Account Management"
    functionalPattern: "Fulfill"
    assetType: "Current Account Facility"
    controlRecord: "Current Account Facility Fulfillment Arrangement"
    phase: "2a-deep"

bian:
  kyc:
    # Phase 2a: accounts auto-approve at opening so flows work end-to-end
    # before the KYC choreography is live. Flip to false once sd-know-your-customer
    # consumes kyc.check.requested and answers via PUT .../kyc-result (or Kafka).
    auto-approve: true

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profile 'kafka': real event transport (gate 2). Without it, events log.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${BIAN_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
